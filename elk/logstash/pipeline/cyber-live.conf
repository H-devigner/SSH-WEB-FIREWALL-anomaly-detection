input {
  file {
    id => "firewall-live-log"
    path => "/data/firewall/live_logs/firewall_live.csv"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_firewall_live_log"
    tags => ["cyber_live", "raw_log", "firewall_raw"]
  }

  file {
    id => "web-live-log"
    path => "/data/web/live_logs/web_access.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_web_live_log"
    tags => ["cyber_live", "raw_log", "web_raw"]
  }

  file {
    id => "ssh-live-log"
    path => "/data/ssh/live_logs/ssh_auth.log"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_ssh_live_log"
    tags => ["cyber_live", "raw_log", "ssh_raw"]
  }

  file {
    id => "firewall-live-scores"
    path => "/data/firewall/live_scores/firewall_scores.jsonl"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_firewall_live_scores"
    codec => json
    tags => ["cyber_live", "prediction", "firewall_score"]
  }

  file {
    id => "web-live-scores"
    path => "/data/web/live_scores/web_scores.jsonl"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_web_live_scores"
    codec => json
    tags => ["cyber_live", "prediction", "web_score"]
  }

  file {
    id => "ssh-live-scores"
    path => "/data/ssh/live_scores/ssh_scores.jsonl"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_ssh_live_scores"
    codec => json
    tags => ["cyber_live", "prediction", "ssh_score"]
  }
}

filter {
  if "prediction" in [tags] {
    mutate {
      add_field => {
        "event_category" => "prediction"
      }
      convert => {
        "prediction" => "integer"
        "anomaly_score" => "float"
        "risk_score" => "float"
        "source_port" => "integer"
        "destination_port" => "integer"
        "status" => "integer"
        "http_status" => "integer"
        "window_events" => "integer"
      }
    }

    if [scored_at] {
      date {
        match => ["scored_at", "ISO8601"]
        target => "@timestamp"
      }
    }
  }

  if "firewall_raw" in [tags] {
    if [message] =~ /^Source Port,/ {
      drop {}
    }

    mutate {
      add_field => {
        "event_category" => "raw_log"
        "model_type" => "firewall"
      }
    }

    csv {
      source => "message"
      columns => [
        "source_port",
        "destination_port",
        "nat_source_port",
        "nat_destination_port",
        "action",
        "bytes",
        "bytes_sent",
        "bytes_received",
        "packets",
        "elapsed_time_sec",
        "pkts_sent",
        "pkts_received"
      ]
      convert => {
        "source_port" => "integer"
        "destination_port" => "integer"
        "nat_source_port" => "integer"
        "nat_destination_port" => "integer"
        "bytes" => "integer"
        "bytes_sent" => "integer"
        "bytes_received" => "integer"
        "packets" => "integer"
        "elapsed_time_sec" => "float"
        "pkts_sent" => "integer"
        "pkts_received" => "integer"
      }
    }
  }

  if "web_raw" in [tags] {
    mutate {
      add_field => {
        "event_category" => "raw_log"
        "model_type" => "web"
      }
    }

    grok {
      match => {
        "message" => '%{IPORHOST:client_ip} - - \[%{DATA:apache_time}\] "%{WORD:http_method} %{DATA:url_path} HTTP/%{NUMBER:http_version}" %{INT:http_status:int} (?:%{INT:response_bytes:int}|-)'
      }
    }

    mutate {
      convert => {
        "http_status" => "integer"
        "response_bytes" => "integer"
      }
    }

    date {
      match => ["apache_time", "dd/MMM/yyyy:HH:mm:ss Z"]
      target => "@timestamp"
    }

    if [http_status] {
      if [http_status] >= 200 and [http_status] < 300 {
        mutate { add_field => { "status_label" => "success" } }
      } else if [http_status] >= 300 and [http_status] < 400 {
        mutate { add_field => { "status_label" => "redirect" } }
      } else if [http_status] >= 400 and [http_status] < 500 {
        mutate { add_field => { "status_label" => "client_error" } }
      } else if [http_status] >= 500 and [http_status] < 600 {
        mutate { add_field => { "status_label" => "server_error" } }
      } else {
        mutate { add_field => { "status_label" => "other" } }
      }
    } else {
      mutate { add_field => { "status_label" => "other" } }
    }
  }

  if "ssh_raw" in [tags] {
    mutate {
      add_field => {
        "event_category" => "raw_log"
        "model_type" => "ssh"
      }
    }

    grok {
      match => {
        "message" => '%{SYSLOGTIMESTAMP:ssh_time} (?<ssh_sensor>\S+) sshd\[%{INT:ssh_pid:int}\]: %{GREEDYDATA:ssh_message}'
      }
    }

    date {
      match => ["ssh_time", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss"]
      target => "@timestamp"
      timezone => "${LOGSTASH_SYSLOG_TIMEZONE:Africa/Casablanca}"
    }

    if [ssh_message] =~ /^Failed password/ {
      grok {
        match => {
          "ssh_message" => 'Failed password for (?:invalid user )?(?<username>\S+) from %{IP:source_ip} port %{INT:source_port:int} ssh2'
        }
      }

      if [ssh_message] =~ /invalid user/ {
        mutate {
          add_field => {
            "event_type" => "failed_login_invalid"
            "status_label" => "invalid_user"
          }
        }
      } else {
        mutate {
          add_field => {
            "event_type" => "failed_login"
            "status_label" => "failed"
          }
        }
      }
    } else if [ssh_message] =~ /^Invalid user / {
      grok {
        match => {
          "ssh_message" => 'Invalid user (?<username>\S+) from %{IP:source_ip}'
        }
      }
      mutate {
        add_field => {
          "event_type" => "invalid_user"
          "status_label" => "invalid_user"
        }
      }
    } else if [ssh_message] =~ /^Accepted / {
      grok {
        match => {
          "ssh_message" => 'Accepted \S+ for (?<username>\S+) from %{IP:source_ip} port %{INT:source_port:int} ssh2'
        }
      }
      mutate {
        add_field => {
          "event_type" => "accepted_login"
          "status_label" => "accepted"
        }
      }
    } else if [ssh_message] =~ /authentication failure;/ {
      grok {
        match => {
          "ssh_message" => 'authentication failure; .*rhost=%{IP:source_ip}'
        }
      }
      grok {
        match => {
          "ssh_message" => '.*user=(?<username>\S+).*'
        }
        tag_on_failure => []
      }
      mutate {
        add_field => {
          "event_type" => "auth_failure"
          "status_label" => "auth_failure"
        }
      }
    } else if [ssh_message] =~ /^Did not receive identification string from / {
      grok {
        match => {
          "ssh_message" => "Did not receive identification string from %{IP:source_ip}"
        }
      }
      mutate {
        add_field => {
          "event_type" => "connection_scan"
          "status_label" => "connection"
        }
      }
    } else if [ssh_message] =~ /^Connection closed by / {
      grok {
        match => {
          "ssh_message" => "Connection closed by %{IP:source_ip}"
        }
      }
      mutate {
        add_field => {
          "event_type" => "connection_closed"
          "status_label" => "connection"
        }
      }
    } else {
      mutate {
        add_field => {
          "event_type" => "other_ssh_event"
          "status_label" => "other"
        }
      }
    }
  }
}

output {
  if "prediction" in [tags] and [model] == "firewall" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "cyber-live-scores-firewall-%{+YYYY.MM.dd}"
      data_stream => false
    }
  } else if "prediction" in [tags] and [model] == "web" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "cyber-live-scores-web-%{+YYYY.MM.dd}"
      data_stream => false
    }
  } else if "prediction" in [tags] and [model] == "ssh" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "cyber-live-scores-ssh-%{+YYYY.MM.dd}"
      data_stream => false
    }
  } else if "firewall_raw" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "cyber-live-raw-firewall-%{+YYYY.MM.dd}"
      data_stream => false
    }
  } else if "web_raw" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "cyber-live-raw-web-%{+YYYY.MM.dd}"
      data_stream => false
    }
  } else if "ssh_raw" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "cyber-live-raw-ssh-%{+YYYY.MM.dd}"
      data_stream => false
    }
  }
}
