input {
  # OPTION 1 : Lecture directe de fichiers/datasets (ex: UCI, CIC-IDS2018)
  file {
    path => "/usr/share/logstash/data/firewall/*.csv"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "firewall"
  }

  # OPTION 2 : Réception temps réel via TCP (remplace l'agent)
  # tcp {
  #   port => 5000
  #   mode => "server"
  #   codec => json
  #   type => "firewall"
  # }
}

filter {
  if [type] == "firewall" {
    # Parsing CSV + suppression de l'en-tête si présent
    if [path] =~ /\.csv$/ {
      csv {
        separator => ","
        columns => ["Source Port", "Destination Port", "NAT Source Port",
                    "NAT Destination Port", "Bytes", "Bytes Sent", "Bytes Received",
                    "Packets", "Elapsed Time (sec)", "pkts_sent", "pkts_received", "Action"]
      }
      # Ignore la ligne d'en-tête du CSV
      if [Source Port] == "Source Port" { drop {} }
    }

    # Conversion stricte des types
    mutate {
      convert => {
        "Source Port" => "integer"
        "Destination Port" => "integer"
        "NAT Source Port" => "integer"
        "NAT Destination Port" => "integer"
        "Bytes" => "integer"
        "Bytes Sent" => "integer"
        "Bytes Received" => "integer"
        "Packets" => "integer"
        "Elapsed Time (sec)" => "float"
        "pkts_sent" => "integer"
        "pkts_received" => "integer"
      }
    }

    # Mapping ECS (Elastic Common Schema)
    mutate {
      rename => {
        "Source Port" => "[source][port]"
        "Destination Port" => "[destination][port]"
        "NAT Source Port" => "[nat][source][port]"
        "NAT Destination Port" => "[nat][destination][port]"
        "Bytes" => "[network][bytes]"
        "Bytes Sent" => "[network][bytes][sent]"
        "Bytes Received" => "[network][bytes][received]"
        "Packets" => "[network][packets]"
        "Elapsed Time (sec)" => "[event][duration]"
        "Action" => "[event][action]"
        "pkts_sent" => "[network][packets][sent]"
        "pkts_received" => "[network][packets][received]"
      }
    }

    # Routage vers le moteur IA (Isolation Forest + XAI)
    if [event][action] in ["deny", "drop", "reset-both"] {
      mutate {
        add_tag => ["firewall_block", "send_to_ml"]
        add_field => { "[sentinel][ml_queue]" => "firewall" }
      }
    }

    # Timestamp par défaut si absent
    if ![@timestamp] {
      mutate { add_field => { "temp_ts" => "%{+YYYY-MM-dd'T'HH:mm:ss.SSSZ}" } }
      date { match => ["temp_ts", "ISO8601"] target => "@timestamp" }
      mutate { remove_field => ["temp_ts"] }
    }
  }
}

output {
  if [type] == "firewall" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "logs-firewall-%{+YYYY.MM.dd}"
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
    }
    # stdout { codec => rubydebug }  # Décommenter pour déboguer
  }
}