title: SSH Invalid User Authentication Attempt
id: sigma-ssh-invalid-user
status: experimental
description: Detects SSH attempts using invalid or unknown usernames.
logsource:
  product: linux
  service: sshd
detection:
  selection:
    event_type:
      - failed_login_invalid
      - invalid_user
  condition: selection
fields:
  - ssh_sensor
  - source_ip
  - source_port
  - username
  - event_type
falsepositives:
  - Mistyped usernames
level: medium
tags:
  - attack.credential-access
